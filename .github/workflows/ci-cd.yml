# ══════════════════════════════════════════════════════════════════════════════
# CI/CD — Maxxi SaaS
# ══════════════════════════════════════════════════════════════════════════════
#
# O que este workflow faz:
#   1. Roda em todo push na branch main e em pull requests
#   2. Instala dependências e faz build do React (frontend)
#   3. Constrói a imagem Docker multi-stage
#   4. Em push na main: faz push da imagem para o registry (GHCR)
#   5. Em push na main: dispara redeploy no Coolify via webhook
#
# SECRETS NECESSÁRIOS (configurar em Settings → Secrets → Actions):
#   REGISTRY_TOKEN      — GitHub Personal Access Token com permissão packages:write
#                         (ou use GITHUB_TOKEN automático — veja comentário abaixo)
#   COOLIFY_WEBHOOK_URL — URL do webhook de deploy do Coolify
#                         (em Coolify: Application → Deploy → Webhook URL)
#   COOLIFY_TOKEN       — Bearer token do Coolify (opcional — depende da config)
#
# VARIÁVEIS (configurar em Settings → Variables):
#   REGISTRY            — ghcr.io (padrão GitHub Container Registry)
#   IMAGE_NAME          — maxxi-saas (nome da imagem)
#
# ══════════════════════════════════════════════════════════════════════════════

name: CI/CD — Build e Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permite o workflow usar o GITHUB_TOKEN para publicar no GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/maxxi-saas

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build do frontend React
  # Roda em todo push e PR — valida que o build não quebra
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: admin-ui
        run: npm ci

      - name: Build do React
        working-directory: admin-ui
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verificar build gerado
        run: |
          ls -lh admin-ui/dist/
          test -f admin-ui/dist/index.html && echo "✅ index.html OK" || exit 1

      # Compartilha o build com o próximo job
      - name: Upload do build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: admin-ui/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Lint e verificações básicas do backend
  # ────────────────────────────────────────────────────────────────────────────
  check-backend:
    name: Verificar Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências do backend
        run: npm ci

      - name: Verificar sintaxe dos arquivos críticos
        run: |
          echo "Verificando sintaxe ESM..."
          node --input-type=module < /dev/null || true
          # Verifica se os imports estão corretos nos arquivos críticos
          node --check src/services/db.js      && echo "✅ db.js"
          node --check src/services/tenant.js  && echo "✅ tenant.js"
          node --check src/services/limites.js && echo "✅ limites.js"
          node --check src/services/conv-state.js && echo "✅ conv-state.js"
          echo "✅ Verificação de sintaxe concluída"

      - name: Verificar que migrate-saas-tenancy.js existe
        run: test -f migrate-saas-tenancy.js && echo "✅ migration script OK"

      - name: Verificar que arquivos de serviço existem
        run: |
          for f in \
            src/services/db.js \
            src/services/tenant.js \
            src/services/limites.js \
            src/services/conv-state.js \
            src/services/memoria.js \
            src/services/erp.js \
            src/services/handoff.js \
            src/agent.js \
            src/webhook.js \
            src/admin.js \
            server.js; do
            test -f "$f" && echo "✅ $f" || (echo "❌ $f MISSING" && exit 1)
          done

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Build da imagem Docker
  # Roda apenas em push na main (não em PRs)
  # ────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Build e Push Docker
    runs-on: ubuntu-latest
    needs: [build-frontend, check-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN é gerado automaticamente pelo Actions — não precisa criar secret
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" para o commit mais recente na main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag com o SHA curto do commit (ex: sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Tag com a data (ex: 2025-03-26)
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Setup Docker Buildx (multi-plataforma)
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre builds para acelerar (usa GitHub Actions Cache)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args opcionais
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Resumo do build
        run: |
          echo "## 🐳 Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imagem:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags geradas:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy via Coolify webhook
  # Dispara o redeploy automático após o push da imagem
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Coolify)
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Garante que apenas um deploy roda por vez (evita race condition)
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    environment:
      name: production
      url: https://app.maxxi.ai  # ajuste para sua URL

    steps:
      - name: Disparar redeploy no Coolify
        run: |
          echo "🚀 Disparando deploy no Coolify..."
          HTTP_STATUS=$(curl -s -o /tmp/coolify_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"force": false}')

          echo "Status HTTP: $HTTP_STATUS"
          cat /tmp/coolify_response.txt

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deploy disparado com sucesso"
          else
            echo "❌ Falha ao disparar deploy (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Aguardar health check
        run: |
          echo "⏳ Aguardando serviço subir (30s)..."
          sleep 30

          MAX_TRIES=10
          TRIES=0
          HEALTH_URL="${{ vars.HEALTH_CHECK_URL || 'https://app.maxxi.ai/health' }}"

          while [ $TRIES -lt $MAX_TRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check OK ($HEALTH_URL)"
              break
            fi
            TRIES=$((TRIES + 1))
            echo "⏳ Tentativa $TRIES/$MAX_TRIES — status: $STATUS"
            sleep 15
          done

          if [ $TRIES -eq $MAX_TRIES ]; then
            echo "⚠️ Health check não respondeu após $MAX_TRIES tentativas"
            echo "Verifique os logs no Coolify"
            # Não falha o workflow — o Coolify tem rollback automático
          fi

      - name: Resumo do deploy
        run: |
          echo "## 🚀 Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ambiente:** production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Mensagem:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
