<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CITmax — Painel SGP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1f2d3d; font-size: 13px; }
    .header { background: #1f2d3d; color: #fff; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
    .header img { width: 24px; height: 24px; border-radius: 50%; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header span { font-size: 11px; opacity: .6; margin-left: auto; }
    .section { background: #fff; margin: 8px; border-radius: 8px; border: 1px solid #e8edf2; overflow: hidden; }
    .section-title { background: #f8fafc; padding: 8px 12px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #6b7a8d; border-bottom: 1px solid #e8edf2; display: flex; align-items: center; gap: 6px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 12px; border-bottom: 1px solid #f0f4f8; }
    .row:last-child { border-bottom: none; }
    .label { color: #6b7a8d; font-size: 11px; }
    .value { font-weight: 600; font-size: 12px; max-width: 60%; text-align: right; word-break: break-word; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
    .badge.ativo    { background: #d1fae5; color: #065f46; }
    .badge.suspenso { background: #fef3c7; color: #92400e; }
    .badge.cancelado{ background: #fee2e2; color: #991b1b; }
    .badge.online   { background: #d1fae5; color: #065f46; }
    .badge.offline  { background: #fee2e2; color: #991b1b; }
    .badge.bloqueado{ background: #fef3c7; color: #92400e; }
    .btn { width: calc(100% - 16px); margin: 4px 8px; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-primary { background: #1f2d3d; color: #fff; }
    .btn-secondary { background: #e8edf2; color: #1f2d3d; }
    .btn:hover { opacity: .85; }
    .loader { text-align: center; padding: 20px; color: #6b7a8d; }
    .error-box { margin: 8px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 12px; color: #991b1b; font-size: 12px; }
    .contrato-item { padding: 8px 12px; border-bottom: 1px solid #f0f4f8; }
    .contrato-item:last-child { border-bottom: none; }
    .contrato-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .contrato-end { font-size: 11px; color: #6b7a8d; margin-top: 2px; }
    select { width: 100%; padding: 6px 10px; border: 1px solid #e8edf2; border-radius: 6px; font-size: 12px; margin: 4px 0; }
    .actions { padding: 4px 0 8px; }
    .tab-bar { display: flex; border-bottom: 2px solid #e8edf2; margin: 0 8px; }
    .tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: #6b7a8d; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #1f2d3d; border-bottom-color: #1f2d3d; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .ocorrencia { padding: 8px 12px; border-bottom: 1px solid #f0f4f8; }
    .ocorrencia:last-child { border-bottom: none; }
    .ocorrencia-data { font-size: 10px; color: #6b7a8d; }
    .ocorrencia-desc { font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div>🛰️</div>
  <h1>Painel CITmax — SGP</h1>
  <span id="hora">--:--</span>
</div>

<div id="app">
  <div class="loader">⏳ Aguardando conversa...</div>
</div>

<script>
const SGP_BASE  = 'https://citrn.sgp.net.br';
const SGP_TOKEN = '05ffb2b9-8d63-406d-8467-d471b82e0c35';
const SGP_APP   = 'n8n';

let currentContactId = null;
let currentContratos = [];
let selectedContrato  = null;

// Atualiza hora
setInterval(() => {
  document.getElementById('hora').textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}, 1000);

// Escuta mensagens do Chatwoot (contexto da conversa)
window.addEventListener('message', async (e) => {
  if (!e.data?.type) return;

  if (e.data.type === 'chatwoot-dashboard-app:fetch-info') {
    const conv = e.data?.payload?.currentConversation;
    const contact = e.data?.payload?.currentContact;
    if (!conv && !contact) return;

    // Tenta extrair CPF dos atributos da conversa
    const cpf = conv?.additional_attributes?.cpf_cnpj
      || contact?.additional_attributes?.cpf_cnpj;

    const telefone = contact?.phone_number?.replace(/\D/g, '');
    const nome = conv?.additional_attributes?.cliente || contact?.name;

    if (cpf) {
      await carregarCliente(cpf, nome);
    } else if (telefone) {
      renderSemCPF(nome || telefone, telefone);
    } else {
      renderSemDados();
    }
  }
});

// Solicita dados ao Chatwoot
window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');

async function sgpGet(path) {
  const res = await fetch(`${SGP_BASE}${path}`, {
    headers: {
      'Authorization': `Bearer ${SGP_TOKEN}`,
      'X-App': SGP_APP,
      'Content-Type': 'application/json',
    }
  });
  if (!res.ok) throw new Error(`SGP ${res.status}`);
  return res.json();
}

async function carregarCliente(cpfcnpj, nomeHint) {
  const digits = cpfcnpj.replace(/\D/g, '');
  document.getElementById('app').innerHTML = '<div class="loader">🔍 Buscando no SGP...</div>';

  try {
    const data = await sgpGet(`/api/clientes?cpfcnpj=${digits}&app=${SGP_APP}&token=${SGP_TOKEN}`);
    const clientes = Array.isArray(data) ? data : (data.data || [data]);
    const cliente = clientes[0];
    if (!cliente) { renderSemDados('Cliente não encontrado no SGP'); return; }

    currentContactId = cliente.id;
    currentContratos = cliente.contratos || [];
    if (currentContratos.length > 0) selectedContrato = currentContratos[0].id;

    renderCliente(cliente);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-box">❌ Erro ao consultar SGP: ${e.message}</div>`;
  }
}

async function carregarConexao(contratoId) {
  try {
    const data = await sgpGet(`/api/contratos/${contratoId}/conexao?app=${SGP_APP}&token=${SGP_TOKEN}`);
    return data;
  } catch { return null; }
}

async function carregarOcorrencias(contratoId) {
  try {
    const data = await sgpGet(`/api/contratos/${contratoId}/ocorrencias?app=${SGP_APP}&token=${SGP_TOKEN}&limit=5`);
    return Array.isArray(data) ? data : (data.data || []);
  } catch { return []; }
}

function statusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('ativo') || s.includes('ativa')) return `<span class="badge ativo">✅ Ativo</span>`;
  if (s.includes('susp')) return `<span class="badge suspenso">⚠️ Suspenso</span>`;
  if (s.includes('cancel')) return `<span class="badge cancelado">🔴 Cancelado</span>`;
  return `<span class="badge">${status}</span>`;
}

function conexaoBadge(online) {
  return online
    ? `<span class="badge online">🟢 Online</span>`
    : `<span class="badge offline">🔴 Offline</span>`;
}

function renderCliente(cliente) {
  const contratos = cliente.contratos || [];
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="section">
      <div class="section-title">👤 Cliente</div>
      <div class="row"><span class="label">Nome</span><span class="value">${cliente.nome || '—'}</span></div>
      <div class="row"><span class="label">CPF/CNPJ</span><span class="value">${cliente.cpfcnpj || '—'}</span></div>
      <div class="row"><span class="label">Fone</span><span class="value">${cliente.fone || cliente.celular || '—'}</span></div>
      <div class="row"><span class="label">Email</span><span class="value" style="font-size:11px">${cliente.email || '—'}</span></div>
    </div>

    <div class="section">
      <div class="section-title">📦 Contratos (${contratos.length})</div>
      <div style="padding: 8px 12px 4px;">
        <select id="contratoSelect" onchange="trocarContrato(this.value)">
          ${contratos.map(c => `<option value="${c.id}">#${c.id} — ${c.status} — ${c.end_logradouro || 'endereço'}</option>`).join('')}
        </select>
      </div>
      <div id="contratoDetalhe"><div class="loader">Carregando...</div></div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="trocarTab('conexao')">📡 Conexão</div>
      <div class="tab" onclick="trocarTab('ocorrencias')">🔧 Chamados</div>
    </div>

    <div id="tab-conexao" class="tab-content active section" style="margin-top:0; border-top:none; border-radius:0 0 8px 8px;">
      <div class="loader">Carregando...</div>
    </div>

    <div id="tab-ocorrencias" class="tab-content section" style="margin-top:0; border-top:none; border-radius:0 0 8px 8px;">
      <div class="loader">Carregando...</div>
    </div>

    <div style="height:12px"></div>
  `;

  if (contratos.length > 0) {
    trocarContrato(contratos[0].id);
  }
}

async function trocarContrato(id) {
  selectedContrato = id;
  const contrato = currentContratos.find(c => String(c.id) === String(id));
  if (!contrato) return;

  // Detalhe do contrato
  document.getElementById('contratoDetalhe').innerHTML = `
    <div class="row"><span class="label">Status</span><span class="value">${statusBadge(contrato.status)}</span></div>
    <div class="row"><span class="label">Plano</span><span class="value">${contrato.plano || contrato.descricao || '—'}</span></div>
    <div class="row"><span class="label">Velocidade</span><span class="value">${contrato.velocidade || '—'}</span></div>
    <div class="row"><span class="label">Vencimento</span><span class="value">Dia ${contrato.venc_dia || '—'}</span></div>
    <div class="row"><span class="label">Endereço</span><span class="value" style="font-size:11px">${[contrato.end_logradouro, contrato.end_numero, contrato.end_bairro].filter(Boolean).join(', ') || '—'}</span></div>
  `;

  // Carrega conexão e ocorrências em paralelo
  const [conexao, ocorrencias] = await Promise.all([
    carregarConexao(id),
    carregarOcorrencias(id),
  ]);

  // Conexão
  const tabConexao = document.getElementById('tab-conexao');
  if (conexao) {
    tabConexao.innerHTML = `
      <div class="row"><span class="label">Status</span><span class="value">${conexaoBadge(conexao.online)}</span></div>
      <div class="row"><span class="label">Acesso</span><span class="value">${conexao.acesso || conexao.login || '—'}</span></div>
      <div class="row"><span class="label">IP</span><span class="value">${conexao.ip || '—'}</span></div>
      <div class="row"><span class="label">Bloqueio</span><span class="value">${conexao.bloqueio || 'Sem bloqueio'}</span></div>
      <div class="row"><span class="label">Última sessão</span><span class="value" style="font-size:11px">${conexao.ultima_sessao || '—'}</span></div>
    `;
  } else {
    tabConexao.innerHTML = '<div class="row"><span class="label">Sem dados de conexão</span></div>';
  }

  // Ocorrências
  const tabOcorrencias = document.getElementById('tab-ocorrencias');
  if (ocorrencias.length > 0) {
    tabOcorrencias.innerHTML = ocorrencias.map(o => `
      <div class="ocorrencia">
        <div class="ocorrencia-data">${o.data_abertura || o.data || '—'} — ${o.tipo || o.titulo || 'Chamado'}</div>
        <div class="ocorrencia-desc">${o.descricao || o.status || '—'}</div>
      </div>
    `).join('');
  } else {
    tabOcorrencias.innerHTML = '<div class="row"><span class="label">Sem chamados recentes</span></div>';
  }
}

function trocarTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['conexao', 'ocorrencias'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
}

function renderSemCPF(nome, tel) {
  document.getElementById('app').innerHTML = `
    <div class="section">
      <div class="section-title">👤 Contato</div>
      <div class="row"><span class="label">Nome</span><span class="value">${nome}</span></div>
      <div class="row"><span class="label">Fone</span><span class="value">${tel}</span></div>
    </div>
    <div class="error-box">CPF/CNPJ ainda não identificado pelo bot.</div>
  `;
}

function renderSemDados(msg) {
  document.getElementById('app').innerHTML = `<div class="loader">${msg || '📭 Nenhuma conversa ativa'}</div>`;
}
</script>
</body>
</html>
