<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#030f0b"/>
<title>PIX CITmax</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c:#00c896;--bg:#030f0b;--panel:#071a14;--border:#0d2e29;--text:#e8f5f0;--muted:#4a7a65}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#00c896,#008b87);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.logo-name{font-size:1.1rem;font-weight:700;color:var(--c)}
.card{width:100%;max-width:400px;background:var(--panel);border:1px solid rgba(0,200,150,.2);border-radius:20px;overflow:hidden}
.card-head{background:linear-gradient(135deg,rgba(0,200,150,.15),rgba(0,139,135,.1));padding:20px;border-bottom:1px solid var(--border)}
.pix-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.pix-title{font-size:1.1rem;font-weight:700;color:var(--c);margin-bottom:2px}
.card-body{padding:20px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-of-type{border-bottom:none}
.info-label{font-size:.78rem;color:var(--muted)}
.info-val{font-size:.88rem;font-weight:600;color:var(--text)}
.info-val.valor{font-size:1.15rem;font-weight:800;color:var(--c)}
.info-val.vencido{color:#ff4757}
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin:16px 0;font-family:monospace;font-size:.7rem;color:var(--c);word-break:break-all;line-height:1.6;position:relative;cursor:pointer}
.code-label{font-size:.65rem;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.btn-copy{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--c),#008b87);color:#030f0b;font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;margin-bottom:10px}
.btn-copy.ok{background:linear-gradient(135deg,#27c93f,#20a839)}
.btn-copy:active{transform:scale(.97)}
.btn-linha{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.85rem;cursor:pointer;transition:.2s}
.btn-linha:hover{border-color:var(--c);color:var(--c)}
.status{text-align:center;padding:14px;font-size:.82rem;color:var(--muted);line-height:1.5}
.status strong{color:var(--c)}
.auto-msg{background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);border-radius:10px;padding:12px;text-align:center;font-size:.8rem;color:var(--c);margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-icon">⚡</div>
  <div class="logo-name">CITmax</div>
</div>

<div class="card">
  <div class="card-head">
    <div class="pix-label">Pagamento via PIX</div>
    <div class="pix-title" id="titulo">Fatura CITmax</div>
  </div>
  <div class="card-body">
    <div class="auto-msg" id="auto-msg">✅ Código PIX copiado automaticamente!</div>
    <div class="info-row">
      <span class="info-label">Valor</span>
      <span class="info-val valor" id="valor">—</span>
    </div>
    <div class="info-row" id="row-venc">
      <span class="info-label">Vencimento</span>
      <span class="info-val" id="vencimento">—</span>
    </div>
    <div class="info-row" id="row-desc" style="display:none">
      <span class="info-label">Referência</span>
      <span class="info-val" id="descricao" style="font-size:.78rem">—</span>
    </div>

    <div id="pix-section">
      <div class="code-label">📲 PIX Copia e Cola</div>
      <div class="code-box" id="pix-code" onclick="copiar('pix')">
        <span id="pix-text">Carregando...</span>
      </div>
      <button class="btn-copy" id="btn-pix" onclick="copiar('pix')">
        📋 Copiar código PIX
      </button>
    </div>

    <div id="linha-section" style="display:none">
      <div class="code-label">🔢 Linha Digitável (boleto)</div>
      <div class="code-box" onclick="copiar('linha')">
        <span id="linha-text"></span>
      </div>
      <button class="btn-linha" onclick="copiar('linha')">📋 Copiar linha digitável</button>
    </div>
  </div>
</div>

<div class="status">
  ✅ Após o pagamento, o acesso é liberado automaticamente em até 10 minutos.<br>
  <strong>App CITmax:</strong> <a href="http://citmax.com.br/app.html" style="color:var(--c)">citmax.com.br/app</a>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var pix    = params.get("pix")    || "";
var linha  = params.get("linha")  || "";
var valor  = params.get("valor")  || "";
var venc   = params.get("venc")   || "";
var desc   = params.get("desc")   || "";
var titulo = params.get("titulo") || "Fatura CITmax";

document.getElementById("titulo").textContent = titulo;
document.getElementById("valor").textContent  = valor ? "R$ " + valor : "—";

if (venc) {
  document.getElementById("vencimento").textContent = venc;
  var hoje = new Date().toISOString().slice(0,10);
  var partes = venc.split("/");
  var dataVenc = partes.length === 3 ? partes[2]+"-"+partes[1]+"-"+partes[0] : venc;
  if (dataVenc < hoje) {
    document.getElementById("vencimento").className = "info-val vencido";
    document.getElementById("vencimento").textContent = venc + " ⚠️ Vencida";
  }
}

if (desc) {
  document.getElementById("descricao").textContent = desc;
  document.getElementById("row-desc").style.display = "flex";
}

if (pix) {
  document.getElementById("pix-text").textContent = pix;
} else {
  document.getElementById("pix-section").style.display = "none";
}

if (linha) {
  document.getElementById("linha-text").textContent = linha;
  document.getElementById("linha-section").style.display = "block";
}

// Auto-copia ao abrir (funciona na maioria dos browsers mobile)
if (pix) {
  setTimeout(function() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(pix).then(function() {
        document.getElementById("auto-msg").style.display = "block";
        document.getElementById("btn-pix").textContent = "✅ PIX copiado!";
        document.getElementById("btn-pix").className = "btn-copy ok";
        setTimeout(function() {
          document.getElementById("btn-pix").textContent = "📋 Copiar código PIX";
          document.getElementById("btn-pix").className = "btn-copy";
        }, 4000);
      }).catch(function(){});
    }
  }, 600);
}

function copiar(tipo) {
  var texto = tipo === "pix" ? pix : linha;
  if (!texto) return;
  var btn = document.getElementById("btn-pix");
  if (navigator.clipboard) {
    navigator.clipboard.writeText(texto).then(function() {
      if (tipo === "pix") {
        btn.textContent = "✅ PIX copiado!";
        btn.className = "btn-copy ok";
        setTimeout(function(){ btn.textContent = "📋 Copiar código PIX"; btn.className = "btn-copy"; }, 3000);
      } else {
        document.querySelector(".btn-linha").textContent = "✅ Copiado!";
        setTimeout(function(){ document.querySelector(".btn-linha").textContent = "📋 Copiar linha digitável"; }, 3000);
      }
    });
  } else {
    var ta = document.createElement("textarea");
    ta.value = texto; ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy");
    ta.remove();
    if (tipo === "pix") { btn.textContent = "✅ Copiado!"; btn.className = "btn-copy ok"; }
  }
}
</script>
</body>
</html>
