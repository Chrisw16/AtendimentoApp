<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CITmax Chat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cor: #00d4ff;
  --cor2: #0099bb;
  --bg: #fff;
  --panel: #f8f9fa;
  --text: #1a1a2e;
  --muted: #6c757d;
  --border: #e9ecef;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* Bubble */
#widget-bubble {
  position:fixed; bottom:20px; right:20px; width:56px; height:56px;
  background:var(--cor); border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(0,212,255,.4);
  font-size:1.4rem; z-index:99999; transition:transform .2s;
  animation: bounce-in .5s ease;
}
#widget-bubble:hover { transform:scale(1.1); }
#widget-bubble .unread-badge {
  position:absolute; top:-2px; right:-2px; background:#ff3b5c; color:#fff;
  font-size:.65rem; font-weight:700; width:18px; height:18px; border-radius:50%;
  display:none; align-items:center; justify-content:center;
}
@keyframes bounce-in { 0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)} }

/* Janela */
#widget-window {
  position:fixed; bottom:86px; right:20px; width:360px; height:520px;
  background:var(--bg); border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,.2);
  display:none; flex-direction:column; z-index:99999; overflow:hidden;
  animation: slide-up .25s ease;
}
@keyframes slide-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
#widget-window.open { display:flex; }

/* Header */
.w-header {
  background: linear-gradient(135deg, var(--cor), var(--cor2));
  padding:14px 16px; color:#fff; display:flex; align-items:center; gap:12px;
}
.w-avatar { width:40px; height:40px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.w-title  { font-weight:700; font-size:.95rem; }
.w-sub    { font-size:.75rem; opacity:.85; margin-top:1px; }
.w-close  { margin-left:auto; cursor:pointer; font-size:1.1rem; opacity:.8; }
.w-close:hover { opacity:1; }

/* Messages */
#w-messages {
  flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px;
  background:var(--panel);
}
#w-messages::-webkit-scrollbar { width:3px; }
#w-messages::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }

.w-msg { display:flex; gap:8px; align-items:flex-end; }
.w-msg.bot  { justify-content:flex-start; }
.w-msg.user { justify-content:flex-end; }
.w-bubble {
  max-width:75%; padding:9px 13px; border-radius:14px; font-size:.87rem; line-height:1.5;
}
.w-msg.bot  .w-bubble { background:#fff; border:1px solid var(--border); border-bottom-left-radius:4px; color:var(--text); }
.w-msg.user .w-bubble { background:var(--cor); color:#fff; border-bottom-right-radius:4px; }
.w-time { font-size:.65rem; color:var(--muted); margin-top:2px; }
.w-typing { display:flex; gap:4px; align-items:center; padding:10px 13px; }
.w-typing span { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:typing .8s infinite; }
.w-typing span:nth-child(2) { animation-delay:.15s; }
.w-typing span:nth-child(3) { animation-delay:.3s; }
@keyframes typing { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* Input */
.w-input-area {
  padding:10px 12px; border-top:1px solid var(--border); background:#fff;
  display:flex; gap:8px; align-items:center;
}
#w-input {
  flex:1; padding:8px 12px; border-radius:20px; border:1px solid var(--border);
  font-size:.88rem; outline:none; transition:border .2s; font-family:inherit;
}
#w-input:focus { border-color:var(--cor); }
#w-send {
  width:36px; height:36px; border-radius:50%; background:var(--cor); border:none;
  cursor:pointer; color:#fff; font-size:.9rem; display:flex; align-items:center; justify-content:center;
  transition:opacity .2s;
}
#w-send:hover { opacity:.85; }
.w-branding { text-align:center; font-size:.65rem; color:var(--muted); padding:4px 0; background:#fff; }

/* Pre-chat form */
#w-prechat { padding:20px; display:flex; flex-direction:column; gap:12px; background:var(--bg); flex:1; }
#w-prechat h3 { font-size:1rem; color:var(--text); margin-bottom:4px; }
#w-prechat p  { font-size:.82rem; color:var(--muted); margin-bottom:8px; }
#w-prechat input {
  width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border);
  font-size:.88rem; outline:none; font-family:inherit; transition:border .2s;
}
#w-prechat input:focus { border-color:var(--cor); }
#w-prechat button {
  padding:12px; border-radius:10px; border:none; background:var(--cor);
  color:#fff; font-weight:700; font-size:.92rem; cursor:pointer; transition:opacity .2s;
}
#w-prechat button:hover { opacity:.85; }

@media(max-width:400px){
  #widget-window { width:calc(100vw - 24px); right:12px; bottom:80px; }
}
</style>
</head>
<body>

<div id="widget-bubble">
  💬
  <div class="unread-badge" id="unread-badge">1</div>
</div>

<div id="widget-window">
  <div class="w-header">
    <div class="w-avatar">⚡</div>
    <div>
      <div class="w-title" id="w-titulo">Fale conosco</div>
      <div class="w-sub" id="w-subtitulo">CITmax · Respondemos em minutos</div>
    </div>
    <div class="w-close" onclick="closeWidget()">✕</div>
  </div>

  <!-- Pre-chat form -->
  <div id="w-prechat">
    <h3>Antes de começar</h3>
    <p>Informe seu nome para personalizarmos o atendimento:</p>
    <input id="w-nome" placeholder="Seu nome" />
    <input id="w-tel"  placeholder="WhatsApp (opcional)" type="tel"/>
    <button onclick="iniciarChat()">Iniciar conversa →</button>
  </div>

  <!-- Chat area (hidden until prechat) -->
  <div id="w-chat-area" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div id="w-messages"></div>
    <div class="w-input-area">
      <input type="text" id="w-input" placeholder="Digite sua mensagem..." onkeydown="wKeyDown(event)"/>
      <button id="w-send" onclick="wEnviar()">➤</button>
    </div>
  </div>
  <div class="w-branding">Powered by CITmax · Maxxi ⚡</div>
</div>

<script>
const BASE    = window.MAXXI_BASE || window.location.origin.replace(/\/widget.*/, "");
const CANAL   = "widget";
let convId    = null;
let nomeUser  = "";
let telUser   = "";
let sseConn   = null;
let isOpen    = false;

// Aplica config do servidor
async function loadConfig() {
  try {
    const r = await fetch(`${BASE}/channels/widget/config`);
    if (!r.ok) return;
    const cfg = await r.json();
    document.getElementById("w-titulo").textContent    = cfg.titulo    || "Fale conosco";
    document.getElementById("w-subtitulo").textContent = cfg.subtitulo || "CITmax · Respondemos em minutos";
    if (cfg.cor) {
      document.documentElement.style.setProperty("--cor",  cfg.cor);
      document.documentElement.style.setProperty("--cor2", cfg.cor + "bb");
    }
  } catch {}
}

document.getElementById("widget-bubble").addEventListener("click", () => {
  isOpen = !isOpen;
  document.getElementById("widget-window").classList.toggle("open", isOpen);
  if (isOpen) { document.getElementById("unread-badge").style.display = "none"; document.getElementById("w-nome").focus(); }
});

function closeWidget() { isOpen = false; document.getElementById("widget-window").classList.remove("open"); }

function iniciarChat() {
  nomeUser = document.getElementById("w-nome").value.trim() || "Visitante";
  telUser  = document.getElementById("w-tel").value.trim();
  if (!nomeUser) { document.getElementById("w-nome").focus(); return; }
  convId = "widget_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
  document.getElementById("w-prechat").style.display      = "none";
  document.getElementById("w-chat-area").style.display    = "flex";
  document.getElementById("w-chat-area").style.flexDirection = "column";
  conectarSSE();
  wAddMsg("bot", "Olá, " + nomeUser + "! 👋 Como posso te ajudar hoje?");
  document.getElementById("w-input").focus();
}

function conectarSSE() {
  sseConn = new EventSource(`${BASE}/channels/widget/stream?convId=${convId}`);
  sseConn.addEventListener("msg", e => {
    const d = JSON.parse(e.data);
    removeTyping();
    wAddMsg("bot", d.content);
    if (!isOpen) showUnread();
  });
}

async function wEnviar() {
  const inp = document.getElementById("w-input");
  const txt = inp.value.trim();
  if (!txt || !convId) return;
  inp.value = "";
  wAddMsg("user", txt);
  showTyping();
  try {
    await fetch(`${BASE}/channels/widget/msg`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ convId, nome: nomeUser, telefone: telUser, msg: txt }),
    });
  } catch { removeTyping(); wAddMsg("bot", "Erro de conexão. Tente novamente."); }
}

function wKeyDown(e) { if (e.key === "Enter") wEnviar(); }

function wAddMsg(role, text) {
  const el = document.getElementById("w-messages");
  const t  = new Date().toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" });
  const div = document.createElement("div");
  div.className = "w-msg " + role;
  div.innerHTML = `<div><div class="w-bubble">${escHtml(text)}</div><div class="w-time" style="text-align:${role==="user"?"right":"left"}">${t}</div></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  removeTyping();
  const el = document.getElementById("w-messages");
  const div = document.createElement("div");
  div.className = "w-msg bot"; div.id = "w-typing-indicator";
  div.innerHTML = '<div class="w-bubble w-typing"><span></span><span></span><span></span></div>';
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}
function removeTyping() { document.getElementById("w-typing-indicator")?.remove(); }
function showUnread() {
  const b = document.getElementById("unread-badge");
  b.style.display = "flex"; b.textContent = parseInt(b.textContent||0) + 1;
}
function escHtml(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

loadConfig();
</script>
</body>
</html>
