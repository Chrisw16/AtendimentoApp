<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#030f0b"/>
<title>Chat CITmax</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --c:#00c896;--c2:#008b87;--bg:#030f0b;--panel:#071a14;--panel2:#0a2019;
  --border:#0d2e29;--text:#e8f5f0;--muted:#4a7a65;--dim:#153d27;
  --red:#ff4757;--yellow:#f5c518;--radius:18px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:640px;margin:0 auto;background:var(--bg);position:relative}

/* ── HEADER ── */
#header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
#header .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--c2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
#header .info{flex:1;min-width:0}
#header .name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header .status{font-size:.72rem;color:var(--c);display:flex;align-items:center;gap:4px;margin-top:1px}
#header .status::before{content:'';width:6px;height:6px;background:var(--c);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;font-size:.9rem;transition:.15s}
.header-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}

/* ── MESSAGES ── */
#msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--dim)}

/* Date divider */
.date-divider{text-align:center;font-size:.68rem;color:var(--muted);margin:6px 0;position:relative}
.date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border)}
.date-divider::before{left:0}.date-divider::after{right:0}

/* Bubbles */
.msg-row{display:flex;flex-direction:column;max-width:82%}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end}
.msg-row.system{align-self:center;max-width:90%}

.bubble{padding:10px 14px;border-radius:var(--radius);font-size:.88rem;line-height:1.55;word-break:break-word;position:relative}
.msg-row.bot .bubble{background:var(--panel);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-row.user .bubble{background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.22);border-bottom-right-radius:4px;color:#d0f5ec}
.msg-row.system .bubble{background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.15);color:var(--yellow);font-size:.78rem;text-align:center;border-radius:10px;padding:7px 12px}

.msg-time{font-size:.62rem;color:var(--muted);margin-top:4px;padding:0 2px}
.msg-row.user .msg-time{text-align:right}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}

/* ── SPECIAL CARDS ── */

/* PIX card */
.pix-card{background:var(--panel2);border:1px solid rgba(0,200,150,.2);border-radius:14px;padding:16px;margin-top:6px}
.pix-card .pix-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:700;font-size:.88rem}
.pix-card .pix-logo{width:32px;height:32px;background:linear-gradient(135deg,#32bcad,#00a896);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.pix-amount{font-size:1.5rem;font-weight:800;color:var(--c);margin-bottom:4px}
.pix-due{font-size:.75rem;color:var(--muted);margin-bottom:12px}
.pix-code{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:monospace;font-size:.7rem;color:var(--c);word-break:break-all;line-height:1.5;margin-bottom:10px;max-height:80px;overflow:hidden;position:relative}
.pix-code.expanded{max-height:none}
.btn-copy{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--c),var(--c2));color:#030f0b;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-copy:hover{opacity:.9;transform:translateY(-1px)}
.btn-copy:active{transform:scale(.98)}
.btn-copy.copied{background:linear-gradient(135deg,#27c93f,#20a839)}
.btn-sec{width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.82rem;cursor:pointer;margin-top:6px;transition:.15s}
.btn-sec:hover{border-color:var(--c);color:var(--c)}

/* Options buttons (quick replies) */
.options-wrap{display:flex;flex-direction:column;gap:7px;margin-top:8px;align-self:flex-start;width:100%;max-width:82%}
.opt-btn{padding:10px 16px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:.84rem;cursor:pointer;text-align:left;transition:.15s;display:flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif}
.opt-btn:hover{border-color:var(--c);background:rgba(0,200,150,.06);color:var(--c)}
.opt-btn:active{transform:scale(.98)}
.opt-btn .opt-num{width:22px;height:22px;border-radius:50%;background:rgba(0,200,150,.12);color:var(--c);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Contract cards */
.contract-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;align-self:flex-start;width:100%;max-width:90%}
.contract-card{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:.15s}
.contract-card:hover{border-color:var(--c);background:rgba(0,200,150,.04)}
.contract-card:active{transform:scale(.97)}
.cc-id{font-weight:700;font-size:.85rem;color:var(--c);margin-bottom:4px}
.cc-addr{font-size:.72rem;color:var(--muted);line-height:1.4}
.cc-status{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;margin-top:6px;padding:2px 7px;border-radius:999px;background:rgba(0,200,150,.1);color:var(--c);border:1px solid rgba(0,200,150,.2)}
.cc-status.inativo{background:rgba(255,71,87,.08);color:#ff4757;border-color:rgba(255,71,87,.2)}

/* Info chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-self:flex-start}
.chip{padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--panel);font-size:.75rem;color:var(--text);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--c);color:var(--c)}

/* ── INPUT ── */
#input-area{padding:10px 12px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-size:.88rem;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.45;font-family:'DM Sans',sans-serif;transition:border .2s}
#msg-input:focus{border-color:var(--c)}
#msg-input::placeholder{color:var(--muted)}
#btn-send{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--c2));border:none;color:#030f0b;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
#btn-send:hover{opacity:.88;transform:scale(1.05)}
#btn-send:active{transform:scale(.95)}
#btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Powered by */
#powered{text-align:center;font-size:.62rem;color:var(--muted);padding:4px;flex-shrink:0}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--c);color:#030f0b;padding:8px 18px;border-radius:999px;font-size:.8rem;font-weight:700;display:none;z-index:999;box-shadow:0 4px 16px rgba(0,200,150,.3);white-space:nowrap}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="avatar">⚡</div>
    <div class="info">
      <div class="name" id="hd-titulo">CITmax</div>
      <div class="status">Online agora</div>
    </div>
    <button class="header-btn" onclick="limparChat()" title="Nova conversa">🔄</button>
  </div>

  <!-- MESSAGES -->
  <div id="msgs"></div>

  <!-- INPUT -->
  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Digite sua mensagem..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="btn-send" onclick="enviar()">➤</button>
    </div>
  </div>

  <div id="powered">Powered by Maxxi IA · CITmax</div>
</div>
<div id="toast"></div>

<script>
var CFG    = window.MAXXI_CONFIG || {};
var BASE   = CFG.base || (window.location.origin.includes('localhost') ? window.location.origin : window.location.origin);
var COR    = CFG.cor || "#00c896";
var TITULO = CFG.titulo || "CITmax";
var SESSAO = localStorage.getItem("maxxi_sessao") || ("sess_" + Date.now().toString(36) + Math.random().toString(36).slice(2));
localStorage.setItem("maxxi_sessao", SESSAO);

document.getElementById("hd-titulo").textContent = TITULO;
document.documentElement.style.setProperty("--c", COR);

var enviando = false;
var histLocal = [];

// ── INIT ──────────────────────────────────────────────────────────────
window.onload = function() {
  // Restaura histórico da sessão
  try {
    var saved = sessionStorage.getItem("chat_hist");
    if (saved) {
      histLocal = JSON.parse(saved);
      histLocal.forEach(function(m){ renderMsg(m, false); });
      scrollBottom();
      return;
    }
  } catch(e) {}
  // Saudação inicial
  setTimeout(function(){
    addBotMsg(CFG.saudacao || "Olá! 👋 Sou a Maxxi, assistente virtual da CITmax. Como posso ajudar?");
  }, 400);
};

function saveHist() {
  try { sessionStorage.setItem("chat_hist", JSON.stringify(histLocal.slice(-40))); } catch(e) {}
}

// ── RENDER MSG ────────────────────────────────────────────────────────
function renderMsg(m, animate) {
  var msgs = document.getElementById("msgs");
  if (m.type === "user") {
    var row = document.createElement("div"); row.className = "msg-row user";
    var t = formatTime(m.ts);
    row.innerHTML = '<div class="bubble">'+escHtml(m.text)+'</div><div class="msg-time">'+t+'</div>';
    if (animate) row.style.animation = "fadeUp .25s ease";
    msgs.appendChild(row);
  } else if (m.type === "bot") {
    var row = document.createElement("div"); row.className = "msg-row bot";
    var t = formatTime(m.ts);
    var content = parseBotContent(m.text);
    row.innerHTML = '<div class="bubble">'+content.html+'</div><div class="msg-time">Maxxi · '+t+'</div>';
    if (animate) row.style.animation = "fadeUp .25s ease";
    msgs.appendChild(row);
    // Render extras (PIX, opções, contratos)
    if (content.extras) content.extras.forEach(function(e){ msgs.appendChild(e); });
  } else if (m.type === "system") {
    var row = document.createElement("div"); row.className = "msg-row system";
    row.innerHTML = '<div class="bubble">'+escHtml(m.text)+'</div>';
    msgs.appendChild(row);
  }
}

// ── PARSE BOT CONTENT ─────────────────────────────────────────────────
function parseBotContent(text) {
  var extras = [];
  var html = text;

  // Detecta PIX copia e cola
  var pixMatch = text.match(/([0-9A-Za-z]{20,}[0-9A-Za-z.]{10,}br\.gov\.bcb\.pix[^\s]*|00020[0-9A-Za-z.]{30,})/);
  if (pixMatch) {
    var pixCode = pixMatch[0].trim();
    // Detecta valor
    var valorMatch = text.match(/R\$\s*([\d.,]+)/);
    var valor = valorMatch ? "R$ " + valorMatch[1] : "";
    // Detecta vencimento
    var vencMatch = text.match(/[Vv]enc\w*[:.]\s*([^\n]+)/);
    var venc = vencMatch ? vencMatch[1].trim() : "";
    // Linha digitável
    var linhaMatch = text.match(/([0-9]{5}\.[0-9]+ [0-9]{10}\.[0-9]+ [0-9]{10}\.[0-9]+ [0-9] [0-9]{14}|[0-9 ]{44,60})/);
    var linha = linhaMatch ? linhaMatch[0].trim() : "";

    // Remove código bruto do texto
    html = text.replace(pixCode, "").replace(/📲.*\n?/g,"").replace(/🔢.*\n?/g,"").replace(linha,"").trim();

    var card = buildPixCard(pixCode, linha, valor, venc);
    extras.push(card);
    return { html: html ? formatMarkdown(html) : "Aqui está seu PIX:", extras };
  }

  // Detecta lista numerada de contratos
  var contratoLines = text.match(/[1-9️⃣🔢]\s*\*?Contrato\s*#(\d+)\*?/g);
  if (contratoLines && contratoLines.length > 1) {
    var contracts = [];
    var re = /(?:[0-9]️⃣|[0-9]\s+)\*?Contrato\s*#(\d+)\*?[^\n]*\n?(?:📍[^\n]*\n?)?(?:🟢[^\n]*\n?)?/g;
    var allContracts = [];
    var m2;
    while ((m2 = re.exec(text)) !== null) {
      var block = m2[0];
      var idM = block.match(/#(\d+)/);
      var addrM = block.match(/📍([^\n]+)/);
      var staM = block.match(/🟢([^\n]*)/);
      if (idM) allContracts.push({ id: idM[1], addr: addrM ? addrM[1].trim() : "", status: staM ? "ativo" : "inativo" });
    }
    if (allContracts.length > 1) {
      var intro = text.split(/[1-9️⃣]/)[0].trim();
      var grid = buildContractGrid(allContracts);
      extras.push(grid);
      return { html: intro ? formatMarkdown(intro) : "Encontrei seus contratos:", extras };
    }
  }

  // Detecta options numeradas simples (Responda com 1, 2...)
  if (text.match(/Responda com (o número|[0-9])/i) || text.match(/Digite (1|o número)/i)) {
    var optLines = text.match(/[1-9]️⃣[^\n]+/g) || text.match(/[1-9][)\.]\s+[^\n]+/g);
    if (optLines && optLines.length >= 2) {
      var intro2 = text.split(/[1-9️⃣]/)[0].trim() || text.split(/\n/)[0];
      var optWrap = buildOptions(optLines);
      extras.push(optWrap);
      return { html: formatMarkdown(intro2), extras };
    }
  }

  return { html: formatMarkdown(html), extras };
}

// ── BUILD PIX CARD ────────────────────────────────────────────────────
function buildPixCard(pixCode, linhaDigitavel, valor, venc) {
  var div = document.createElement("div");
  div.className = "pix-card msg-row bot";
  div.style.alignSelf = "flex-start";
  div.style.width = "100%";
  div.style.maxWidth = "82%";

  var shortCode = pixCode.slice(0,40)+"...";
  div.innerHTML = '<div class="pix-header"><div class="pix-logo">🏦</div><span>Pagamento PIX</span></div>'
    +(valor ? '<div class="pix-amount">'+escHtml(valor)+'</div>' : '')
    +(venc  ? '<div class="pix-due">📅 Vencimento: '+escHtml(venc)+'</div>' : '')
    +'<div style="font-size:.7rem;color:var(--muted);margin-bottom:6px">📲 PIX Copia e Cola</div>'
    +'<div class="pix-code" id="pix-code-el">'+escHtml(pixCode)+'</div>'
    +'<button class="btn-copy" onclick="copiarPix(\''+pixCode.replace(/'/g,"\\'")+'\')" id="btn-pix-copy">📋 Copiar código PIX</button>'
    +(linhaDigitavel ? '<div style="font-size:.7rem;color:var(--muted);margin:10px 0 4px">🔢 Linha Digitável</div>'
      +'<div class="pix-code" style="font-size:.65rem">'+escHtml(linhaDigitavel)+'</div>'
      +'<button class="btn-sec" onclick="copiarTexto(\''+linhaDigitavel.replace(/'/g,"\\'")+'\',\'Linha copiada!\')">📋 Copiar linha digitável</button>'
      : '');
  return div;
}

// ── BUILD CONTRACT GRID ───────────────────────────────────────────────
function buildContractGrid(contracts) {
  var div = document.createElement("div");
  div.className = "contract-grid";
  contracts.slice(0,8).forEach(function(c) {
    var card = document.createElement("div");
    card.className = "contract-card";
    card.innerHTML = '<div class="cc-id">#'+escHtml(c.id)+'</div>'
      +(c.addr?'<div class="cc-addr">'+escHtml(c.addr.slice(0,40))+'</div>':'')
      +'<div class="cc-status'+(c.status==="inativo"?" inativo":"")+'">'+( c.status==="inativo"?"○ Inativo":"● Ativo")+'</div>';
    card.onclick = function() { enviarTexto(c.id); };
    div.appendChild(card);
  });
  return div;
}

// ── BUILD OPTIONS ─────────────────────────────────────────────────────
function buildOptions(lines) {
  var wrap = document.createElement("div");
  wrap.className = "options-wrap";
  lines.slice(0,8).forEach(function(l, i) {
    var clean = l.replace(/^[0-9️⃣]+[\s.)\-]*/,"").trim();
    var btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = '<span class="opt-num">'+(i+1)+'</span>'+escHtml(clean);
    btn.onclick = function(){ enviarTexto(String(i+1)); };
    wrap.appendChild(btn);
  });
  return wrap;
}

// ── FORMAT MARKDOWN ───────────────────────────────────────────────────
function formatMarkdown(text) {
  if (!text) return "";
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,'<code style="background:rgba(0,200,150,.1);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.82em">$1</code>')
    .replace(/\n/g,"<br>");
}

// ── SEND ──────────────────────────────────────────────────────────────
function enviar() {
  var inp = document.getElementById("msg-input");
  var txt = inp.value.trim();
  if (!txt || enviando) return;
  inp.value = ""; inp.style.height = "auto";
  enviarTexto(txt);
}

function enviarTexto(txt) {
  if (!txt || enviando) return;
  var msg = { type:"user", text:txt, ts: Date.now() };
  histLocal.push(msg);
  renderMsg(msg, true);
  saveHist();
  scrollBottom();
  showTyping();
  enviando = true;
  document.getElementById("btn-send").disabled = true;

  fetch(BASE+"/widget/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ sessao:SESSAO, mensagem:txt }),
  }).then(function(r){ return r.json(); })
    .then(function(d) {
      removeTyping();
      enviando = false;
      document.getElementById("btn-send").disabled = false;
      var resp = d.resposta || "Como posso ajudar?";
      var botMsg = { type:"bot", text:resp, ts:Date.now() };
      histLocal.push(botMsg);
      renderMsg(botMsg, true);
      saveHist();
      scrollBottom();
    })
    .catch(function() {
      removeTyping();
      enviando = false;
      document.getElementById("btn-send").disabled = false;
      var errMsg = { type:"bot", text:"Desculpe, tive um problema. Tente novamente!", ts:Date.now() };
      histLocal.push(errMsg);
      renderMsg(errMsg, true);
      saveHist();
      scrollBottom();
    });
}

// ── TYPING ────────────────────────────────────────────────────────────
function showTyping() {
  var msgs = document.getElementById("msgs");
  var d = document.createElement("div");
  d.id = "typing"; d.className = "msg-row bot";
  d.innerHTML = '<div class="bubble" style="padding:8px 14px"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);
  scrollBottom();
}
function removeTyping() { var el=document.getElementById("typing"); if(el) el.remove(); }

// ── UTILS ─────────────────────────────────────────────────────────────
function scrollBottom(){ var m=document.getElementById("msgs"); setTimeout(function(){ m.scrollTop=m.scrollHeight; },50); }
function formatTime(ts){ return new Date(ts||Date.now()).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }
function escHtml(s){ var d=document.createElement("div"); d.appendChild(document.createTextNode(String(s||""))); return d.innerHTML; }

function autoResize(el){
  el.style.height="auto";
  el.style.height=Math.min(el.scrollHeight,100)+"px";
}
function handleKey(e){
  if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); enviar(); }
}
function limparChat(){
  if(!confirm("Iniciar nova conversa?")) return;
  sessionStorage.removeItem("chat_hist");
  histLocal=[];
  document.getElementById("msgs").innerHTML="";
  var newSessao="sess_"+Date.now().toString(36)+Math.random().toString(36).slice(2);
  SESSAO=newSessao;
  localStorage.setItem("maxxi_sessao",SESSAO);
  setTimeout(function(){
    addBotMsg(CFG.saudacao||"Olá! 👋 Sou a Maxxi. Como posso ajudar?");
  },200);
}

function addBotMsg(text){
  var m={type:"bot",text:text,ts:Date.now()};
  histLocal.push(m);
  renderMsg(m,true);
  saveHist();
  scrollBottom();
}

function toast(msg, dur){
  var el=document.getElementById("toast");
  el.textContent=msg; el.style.display="block";
  setTimeout(function(){ el.style.display="none"; }, dur||2000);
}

function copiarPix(codigo) {
  copiarTexto(codigo, "✅ PIX copiado!");
}

function copiarTexto(texto, msg) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(texto).then(function(){
      toast(msg || "✅ Copiado!");
      var btn = document.getElementById("btn-pix-copy");
      if(btn){ btn.textContent="✅ PIX copiado!"; btn.className="btn-copy copied"; setTimeout(function(){ btn.textContent="📋 Copiar código PIX"; btn.className="btn-copy"; },2500); }
    }).catch(function(){ fallbackCopy(texto, msg); });
  } else {
    fallbackCopy(texto, msg);
  }
}

function fallbackCopy(texto, msg) {
  var ta=document.createElement("textarea");
  ta.value=texto; ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast(msg||"✅ Copiado!"); }
  catch(e){ toast("Copie manualmente"); }
  ta.remove();
}
</script>
