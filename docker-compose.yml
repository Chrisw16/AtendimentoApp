version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maxxi-postgres
    environment:
      POSTGRES_USER:     maxxi
      POSTGRES_PASSWORD: maxxi_dev_pass
      POSTGRES_DB:       maxxi_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxxi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: maxxi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: maxxi-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:      development
      PORT:          4000
      DATABASE_URL:  postgresql://maxxi:maxxi_dev_pass@postgres:5432/maxxi_v2
      REDIS_URL:     redis://redis:6379
      JWT_SECRET:    dev-secret-change-in-production
      CORS_ORIGIN:   http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: maxxi-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
